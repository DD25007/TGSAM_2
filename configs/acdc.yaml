# ACDC (Cardiac MRI) Configuration
# Paper: 100 train, 50 test volumes for LV, RV, Myocardium

dataset:
  name: "acdc"
  root: "dataset/ACDC"
  split: "training"
  test_split: "testing"
  image_size: 1024
  augment: true

# Cardiac structures
structures:
  - "left_ventricle"
  - "right_ventricle"
  - "myocardium"

# Training hyperparameters
train:
  batch_size: 4
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0
  warmup_steps: 500
  lr_schedule: "steplr"
  lr_schedule_params:
    step_size: 10
    gamma: 0.5
  
# Loss & optimization
loss:
  type: "dicebce"
  dice_weight: 0.5
  bce_weight: 0.5
  smooth: 1.0

optimizer:
  type: "adam"
  betas: [0.9, 0.999]
  eps: 1e-8

# Memory & checkpointing
train_config:
  memory_bank_size: 4
  checkpoint_dir: "outputs/acdc"
  save_frequency: 5
  validation_frequency: 1

# Evaluation metrics
eval:
  threshold: 0.5
  metrics: ["dsc", "iou", "sensitivity", "specificity"]
